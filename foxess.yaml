esphome:
  name: foxess
  friendly_name: foxess

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:
  level: WARN
  baud_rate: 0

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:

captive_portal:

web_server:

external_components:
  - source: github://redunder997/foxess_solar
    components: [foxess_solar]

uart:
  id: uart_bus
  tx_pin: GPIO3
  rx_pin: GPIO5
  baud_rate: 9600

sensor:
  - platform: foxess_solar
    total_energy_production:
      name: "Total Energy Production"
    energy_production_day:
      name: "Today Energy Production"
    generation_power:
      name: "FoxESS Generation Power"
